services:
  # ── Zookeeper ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: em-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD", "echo", "ruok", "|", "nc", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-monitor

  # ── Kafka ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: em-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - event-monitor

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: em-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-monitor

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: em-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-eventmonitor}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-eventmonitor123}
      POSTGRES_DB: ${PG_DATABASE:-eventmonitor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-eventmonitor}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-monitor

  # ── Backend (Express + WS + Consumer) ──────────────────
  backend:
    build: ./backend
    container_name: em-backend
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKER: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-eventmonitor}
      PG_PASSWORD: ${PG_PASSWORD:-eventmonitor123}
      PG_DATABASE: ${PG_DATABASE:-eventmonitor}
      PORT: 3000
    restart: unless-stopped
    networks:
      - event-monitor

  # ── Producer (event generator) ─────────────────────────
  producer:
    build: ./backend
    container_name: em-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      EVENTS_PER_SEC: ${EVENTS_PER_SEC:-1}
    command: [ "node", "src/kafka/producer.js" ]
    restart: unless-stopped
    networks:
      - event-monitor

volumes:
  pgdata:


networks:
  event-monitor:
    driver: bridge
